aid: ulta-salon-cosmetics-and-fragrance
name: Ulta Salon, Cosmetics & Fragrance
description: >-
  Ulta Salon, Cosmetics & Fragrance (now operating as Ulta Beauty) is the largest
  beauty retailer in the United States, offering cosmetics, fragrance, skin care
  products, hair care products, and salon services through retail stores and online.
  This entry tracks the legacy brand identity prior to the Ulta Beauty rebranding.
  No public developer API is currently available.
